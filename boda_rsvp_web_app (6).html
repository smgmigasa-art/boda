<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Salvador & Sandy | 25.07.26</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />

    <style>
        /* --- ESTILOS BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #ffffff; color: #5c4a42; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- NAVEGACIÓN --- */
        nav { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.95); display: flex; justify-content: center; gap: 20px; padding: 18px; box-shadow: 0 4px 20px rgba(0,0,0,.05); z-index: 1000; }
        nav a { text-decoration: none; color: #7a5a4d; font-size: 12px; letter-spacing: 1px; font-weight: 500; text-transform: uppercase; }

        /* --- HERO --- */
        .hero { 
            height: 100vh; 
            background: linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.35)), url("Photo-49.jpg") center/cover no-repeat; 
            background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; 
        }
        .hero h1 { font-family: 'Great Vibes', cursive; font-size: clamp(50px, 10vw, 100px); text-shadow: 2px 4px 15px rgba(0,0,0,0.4); }
        .hero p { font-size: 20px; letter-spacing: 4px; font-family: 'Playfair Display', serif; text-transform: uppercase; }

        /* --- COUNTDOWN --- */
        .countdown { display: flex; gap: 10px; margin-top: 30px; }
        .countdown div { background: rgba(255,255,255,.15); backdrop-filter: blur(8px); padding: 12px; border-radius: 12px; min-width: 70px; border: 1px solid rgba(255,255,255,0.3); }
        .countdown span { font-size: 24px; font-weight: bold; display: block; font-family: 'Playfair Display', serif; }

        /* --- SECCIONES --- */
        .section { max-width: 1000px; margin: 80px auto; padding: 40px 20px; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; font-size: 32px; color: #7a5a4d; margin-bottom: 30px; }
        h2::after { content: '❤'; font-size: 14px; display: block; color: #d4b2a1; margin-top: 5px; }

        /* --- GALERÍA SWIPER --- */
        .swiper { width: 100%; padding: 50px 0; }
        .swiper-slide { width: 300px; height: 420px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); cursor: zoom-in; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .swiper-slide:hover img { transform: scale(1.05); }

        /* --- RSVP FORM --- */
        #rsvpForm { max-width: 400px; margin: 0 auto; background: #fdfaf8; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #e7ded8; font-family: 'Poppins', sans-serif; }
        button { width: 100%; padding: 15px; margin-top: 20px; border: none; background: #a68472; color: white; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        button:disabled { background: #ccc; }
        .whatsapp { background: #25D366; margin-top: 10px; }

        /* --- MÚSICA Y EFECTOS --- */
        .music-bubble { 
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; 
            border-radius: 50%; background: #a68472; color: white; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 24px; transition: transform 0.3s;
        }
        .music-bubble.playing { animation: pulse 2s infinite; }
        @keyframes pulse { 
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(166, 132, 114, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(166, 132, 114, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(166, 132, 114, 0); }
        }

        .petal { position: fixed; top: -40px; font-size: 15px; opacity: 0.6; animation: fall linear infinite; pointer-events: none; z-index: 999; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        footer { padding: 40px; text-align: center; background: #fdfaf8; color: #a68472; font-size: 13px; }
    </style>
</head>
<body>

    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#galeria">Fotos</a>
        <a href="#evento">Evento</a>
        <a href="#rsvp">RSVP</a>
    </nav>

    <section class="hero" id="inicio">
        <h1>Salvador & Sandy</h1>
        <p>25 de Julio, 2026</p>
        <div class="countdown">
            <div><span id="dias">0</span>Días</div>
            <div><span id="horas">0</span>Hrs</div>
            <div><span id="minutos">0</span>Min</div>
            <div><span id="segundos">0</span>Seg</div>
        </div>
    </section>

    <section class="section reveal" id="galeria">
        <h2>Nuestra Galería</h2>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <a href="Photo-49.jpg" data-fancybox="gallery"><img src="Photo-49.jpg"></a>
                </div>
                <div class="swiper-slide">
                    <a href="Photo-52.jpg" data-fancybox="gallery"><img src="Photo-52.jpg"></a>
                </div>
                <div class="swiper-slide">
                    <a href="Photo-20.jpg" data-fancybox="gallery"><img src="Photo-20.jpg"></a>
                </div>
                <div class="swiper-slide">
                    <a href="Photo-41.jpg" data-fancybox="gallery"><img src="Photo-41.jpg"></a>
                </div>
                <div class="swiper-slide">
                    <a href="Photo-83.jpg" data-fancybox="gallery"><img src="Photo-83.jpg"></a>
                </div>
            </div>
            <div class="swiper-button-next" style="color: #a68472"></div>
            <div class="swiper-button-prev" style="color: #a68472"></div>
        </div>
    </section>

    <section class="section reveal" id="evento">
        <h2>Detalles</h2>
        <p>📍 <a href="https://maps.google.com" target="_blank" style="color: inherit;">Quinta Las Flores, CDMX</a></p>
        <p>⏰ Recepción: 17:00 HRS</p>
        <div style="margin-top: 20px;">
            <span>👗 Gala / 👔 Traje Formal</span>
        </div>
    </section>

    <section class="section reveal" id="rsvp">
        <h2>¿Nos acompañas?</h2>
        <form id="rsvpForm">
            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <input type="number" id="personas" placeholder="¿Cuántos asisten?" min="1" required>
            <select id="asistencia">
                <option value="Si">¡Sí, confirmo!</option>
                <option value="No">No podré asistir</option>
            </select>
            <button type="submit" id="submitBtn">Confirmar en la Web</button>
            <button type="button" class="whatsapp" onclick="confirmarWhatsApp()">Vía WhatsApp</button>
        </form>
    </section>

    <div class="music-bubble" id="musicBtn" onclick="toggleMusic()">
        <span id="musicIcon">♪</span>
    </div>
    
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <footer>
        <p>Salvador & Sandy | 2026 ❤️</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>

    <script>
        const SCRIPT_URL = 'TU_URL_DE_GOOGLE_SCRIPT_AQUI'; 
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const musicIcon = document.getElementById('musicIcon');

        // Función Música
        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicIcon.innerText = 'II';
                musicBtn.classList.add('playing');
            } else {
                music.pause();
                musicIcon.innerText = '♪';
                musicBtn.classList.remove('playing');
            }
        }

        // Fancybox Zoom
        Fancybox.bind("[data-fancybox]", {});

        // Swiper
        new Swiper(".mySwiper", {
            effect: "coverflow",
            centeredSlides: true,
            slidesPerView: "auto",
            loop: true,
            autoplay: { delay: 3000 },
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" }
        });

        // Revelar al hacer scroll
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('visible'); });
        });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Pétalos
        setInterval(() => {
            const petal = document.createElement('div');
            petal.className = 'petal'; petal.innerText = '🌸';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 8000);
        }, 1500);

        // Cuenta regresiva
        const fechaBoda = new Date("July 25, 2026 17:00:00").getTime();
        setInterval(() => {
            const ahora = new Date().getTime();
            const diff = fechaBoda - ahora;
            if (diff > 0) {
                document.getElementById("dias").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById("horas").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("minutos").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("segundos").innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }
        }, 1000);

        // RSVP Form
        document.getElementById('rsvpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Enviando...";
            btn.disabled = true;

            const datos = {
                nombre: document.getElementById('nombre').value,
                personas: document.getElementById('personas').value,
                asistencia: document.getElementById('asistencia').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(datos)
            }).then(() => {
                alert('¡Confirmación recibida!');
                btn.innerText = "Confirmado ✓";
                document.getElementById('rsvpForm').reset();
            }).catch(() => {
                alert('Error al enviar. Intenta por WhatsApp.');
                btn.disabled = false;
            });
        });

        function confirmarWhatsApp() {
            const nom = document.getElementById('nombre').value || "Invitado";
            const msg = `¡Hola! Confirmo mi asistencia a la boda de Salvador y Sandy. Nombre: ${nom}. ❤️`;
            window.open(`https://wa.me/529982249951?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
