<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salvador & Sandy | Nuestra Boda</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />

    <style>
        :root {
            --primary: #b8926a; 
            --bg: #faf9f6;      
            --text: #4a4a4a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Pantalla de Bienvenida (Para activar música) */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 3000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        #overlay h2 { font-family: 'Cormorant Garamond', serif; margin-bottom: 20px; }
        #btnEntrar {
            padding: 15px 30px; border: 1px solid var(--primary);
            background: transparent; color: var(--primary);
            letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
        }

        nav { position: fixed; top: 0; width: 100%; background: rgba(250,249,246,0.9); display: flex; justify-content: center; gap: 30px; padding: 15px; z-index: 1000; border-bottom: 1px solid rgba(184,146,106,0.2); }
        nav a { text-decoration: none; color: var(--primary); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

        .hero { 
            height: 100vh; 
            background: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.2)), url("Photo-41.jpg") center/cover no-repeat; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .hero-box {
            padding: 40px; border: 1px solid var(--primary);
            max-width: 90%; background: rgba(255,255,255,0.3); backdrop-filter: blur(3px);
        }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(40px, 8vw, 80px); font-weight: 300; }

        .section { max-width: 1100px; margin: 80px auto; padding: 20px; text-align: center; }
        .divider { width: 60px; height: 1px; background: var(--primary); margin: 20px auto; position: relative; }
        .divider::after { content: '◈'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg); padding: 0 10px; color: var(--primary); }

        /* --- CORRECCIÓN SLIDER --- */
        .swiper { width: 100%; padding: 40px 0 60px; }
        .swiper-slide { 
            width: 280px !important; /* Forzamos el ancho */
            height: 400px; 
            background: #fff;
            border: 8px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        .swiper-pagination-bullet-active { background: var(--primary); }

        /* Formulario y Botones */
        input, select { width: 100%; padding: 15px; margin-top: 15px; border: none; border-bottom: 1px solid #ddd; background: transparent; }
        button { width: 100%; padding: 18px; margin-top: 30px; border: 1px solid var(--primary); background: transparent; color: var(--primary); cursor: pointer; transition: 0.4s; }
        button:hover { background: var(--primary); color: white; }
        .music-bubble { position: fixed; bottom: 30px; left: 30px; width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--primary); display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 2000; background: white; }

        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Salvador & Sandy</h2>
        <p style="letter-spacing: 3px; margin-bottom: 20px;">NUESTRA BODA</p>
        <button id="btnEntrar" onclick="iniciarExperiencia()">ABRIR INVITACIÓN</button>
    </div>

    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#evento">Evento</a>
        <a href="#galeria">Galería</a>
        <a href="#rsvp">Confirmar</a>
    </nav>

    <section class="hero" id="inicio">
        <div class="hero-box reveal">
            <p style="letter-spacing: 5px;">BIENVENIDOS</p>
            <h1>Salvador & Sandy</h1>
            <div class="divider"></div>
            <div id="reloj" style="display:flex; justify-content:center; gap:15px; font-family:'Cormorant Garamond'">
                <div><span id="dias" style="font-size:25px; display:block">0</span>DÍAS</div>
                <div><span id="horas" style="font-size:25px; display:block">0</span>HRS</div>
                <div><span id="minutos" style="font-size:25px; display:block">0</span>MIN</div>
            </div>
        </div>
    </section>

    <section class="section reveal" id="galeria">
        <p style="letter-spacing: 3px; font-size: 12px;">MOMENTOS</p>
        <h2>Nuestra Historia</h2>
        <div class="divider"></div>
        
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><a href="Photo-49.jpg" data-fancybox="gallery"><img src="Photo-49.jpg"></a></div>
                <div class="swiper-slide"><a href="Photo-52.jpg" data-fancybox="gallery"><img src="Photo-52.jpg"></a></div>
                <div class="swiper-slide"><a href="Photo-20.jpg" data-fancybox="gallery"><img src="Photo-20.jpg"></a></div>
                <div class="swiper-slide"><a href="Photo-41.jpg" data-fancybox="gallery"><img src="Photo-41.jpg"></a></div>
                <div class="swiper-slide"><a href="Photo-83.jpg" data-fancybox="gallery"><img src="Photo-83.jpg"></a></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <div class="music-bubble" id="musicBtn" onclick="toggleMusic()">♪</div>
    <audio id="bgMusic" loop preload="auto">
        <source src="Our_Lunar_Vow.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>

    <script>
        // 1. FUNCIÓN PARA INICIAR MÚSICA Y QUITAR OVERLAY
        function iniciarExperiencia() {
            const music = document.getElementById('bgMusic');
            music.play().catch(error => console.log("Error al reproducir:", error));
            
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
            }, 1000);
            
            // Inicializar Swiper después de entrar para asegurar que el DOM esté listo
            initSwiper();
        }

        // 2. INICIALIZAR EL SLIDER
        function initSwiper() {
            new Swiper(".mySwiper", {
                effect: "coverflow",
                grabCursor: true,
                centeredSlides: true,
                slidesPerView: "auto",
                loop: true,
                coverflowEffect: {
                    rotate: 20,
                    stretch: 0,
                    depth: 100,
                    modifier: 1,
                    slideShadows: true,
                },
                autoplay: { delay: 3000 },
                pagination: { el: ".swiper-pagination", clickable: true },
            });
        }

        // 3. CONTROL MANUAL DE MÚSICA
        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            if (music.paused) {
                music.play();
                document.getElementById('musicBtn').innerText = 'II';
            } else {
                music.pause();
                document.getElementById('musicBtn').innerText = '♪';
            }
        }

        // 4. ANIMACIONES AL HACER SCROLL
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Fancybox
        Fancybox.bind("[data-fancybox]", {});

        // Countdown simple
        const target = new Date("July 25, 2026 17:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if(diff > 0) {
                document.getElementById("dias").innerText = Math.floor(diff / (1000*60*60*24));
                document.getElementById("horas").innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                document.getElementById("minutos").innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
            }
        }, 1000);
    </script>
</body>
</html>
